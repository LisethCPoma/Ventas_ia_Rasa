      text: "¡Te comento que el proceso de inscripción es muy sencillo! 😊 Para el **Curso de Capacitación**, solo necesitas presentar:\n\n* 🔴 **Copia de tu cédula**.\n* 👥 **Copia de la cédula de un representante** (solo si eres menor de edad).\n* 📜 **Tu título de bachiller** <a href='https://servicios.educacion.gob.ec/titulacion25-web/faces/paginas/consulta-titulos-refrendados.xhtml' target='_blank' class='text-primary underline font-medium hover:opacity-80' data-novoz='true'>→ Ver certificado en línea</a>.\n* 💰 **Comprobante de pago**, que corresponde al primer mes.\n\n¡Recuerda que la inscripción y la matrícula son **completamente GRATUITAS**! Mi asistente humana **Daniela** te guiará paso a paso para que puedas empezar hoy mismo. 👩‍💼"
    - condition:
        - type: slot
          name: tipo_formacion
          value: carrera
      text: "¡Excelente decisión! Inscribirte en la **Carrera de Tecnología Superior** es el mejor paso para tu futuro. 🚀 Solo necesitas:\n\n* 🔴 **Copia a color de tu cédula**.\n* 📜 **Certificado de título de bachiller** <a href='https://servicios.educacion.gob.ec/titulacion25-web/faces/paginas/consulta-titulos-refrendados.xhtml' target='_blank' class='text-primary underline font-medium hover:opacity-80' data-novoz='true'>→ Ver certificado en línea</a>.\n* 📸 **2 fotos tamaño carnet**.\n* 💰 **Tu comprobante**.\n\n¡Mi asistente **Daniela** te ayudará a completar tu registro aquí mismo en el Instituto CGE! 🏫✨"
    - text: "🌟 ¡Estás a un paso de iniciar! Para darte los requisitos exactos, ¿te interesa un **Curso Corto** o una **Carrera de 2 años**?\n\nDe igual forma, mi asistente **Daniela** está aquí contigo para ayudarte con los papeles y resolver cualquier duda ahora mismo. 📝"

