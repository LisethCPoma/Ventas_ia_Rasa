  utter_que_aprenderas_capacitadora:
  - text: "En la Capacitadora CGE nuestros cursos están diseñados para que puedas aprender habilidades prácticas reales dentro de cada área.\n\nTe comparto lo que aprenderás en cada uno de nuestros cursos:\n\n**Enfermería**\nAprenderás sobre el cuidado de pacientes dentro de clínicas, hospitales, casas de salud y centros geriátricos. Actividades:\n- Medición de signos vitales\n- Inyectología y sueroterapia\n- Curaciones de heridas y suturas\n- Participación en áreas como quirófano, UCI y salas hospitalarias.\n\n**Emergencias Médicas**\nGracias a nuestras ambulancias, atenderás emergencias 100% reales. Aprenderás:\n- Reanimación avanzada y medición de signos vitales avanzados\n- Suturas avanzadas, inyectología y sueroterapia\n- Atención de traumas y quemaduras.\n\n**Rehabilitación Física**\nSe enfoca en ayudar a los pacientes a recuperar su movilidad, fuerza y vitalidad después de lesiones o accidentes mediante diferentes terapias.\n\n**Laboratorio Clínico**\nAprenderás sobre:\n- Extracción, recepción y entrega de resultados de muestras\n- Indicaciones al paciente\n- Limpieza y manejo del laboratorio.\n\n**Naturopatía**\nSe enfoca en el bienestar físico y emocional a través de terapias naturales. Incluye:\n- Registro de historial natural de salud\n- Asistencia en consultas y preparación de productos naturales\n- Apoyo en masajes naturales.\n\n**Odontología**\nAprenderás a:\n- Asistir en intervenciones odontológicas y apoyo administrativo\n- Preparar instrumental, resinas, cementos o alginatos para impresiones\n- Realizar control de inventario.\n\n**Farmacia**\nManejo de medicamentos para su venta y administración adecuada:\n- Nombres genéricos y comerciales\n- Dosificación, vía de administración y efectos secundarios.\n\n**Veterinaria**\nCuidado de especies mayores y menores. Aprenderás:\n- Medición de signos vitales, suturas, inyectología y sueroterapia\n- Preparación de instrumentos y asistencia en cirugías\n- Administración de medicamentos bajo supervisión.\n\n**Educación Inicial**\nCuidado y desarrollo de niños desde los 0 años:\n- Recreación, estimulación temprana y pintado de caritas\n- Colaboración con docentes y fomento de hábitos de convivencia.\n\n**Taller de Inyectología**\nTaller 100% práctico donde aprenderás a:\n- Colocar sueros y aplicar inyecciones de forma profesional.\n\n**Mecánica básica de motos para mujeres**\nAprenderás sobre:\n- Sistema de transmisión, frenos, suspensión, sistema eléctrico, encendido y mantenimiento preventivo.\n\n**Mecánica básica de vehículos dirigida al personal de salud**\nAprenderás a actuar ante:\n- Pérdida de frenos o potencia, vehículo varado, sobrecalentamiento y fallas eléctricas.\n\n**Flores de Bach**\nBienestar emocional a través de esencias florales naturales. Aprenderás a:\n- Identificar emociones (estrés, ansiedad, depresión)\n- Dosificar esencias y aplicar terapias naturales para el equilibrio integral.\n\nSi deseas, puedo ayudarte también a conocer la duración o el costo del curso que te interesa."

