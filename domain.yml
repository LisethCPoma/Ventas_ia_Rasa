  utter_preguntar_homologacion_inicial:
  - text: "🤔 ¡Claro! Antes de explicarte el proceso de homologación, me gustaría saber algo importante:\n\n¿Ya realizas algún curso de capacitación con nosotros relacionados con la carrera que deseas estudiar?"

  utter_homologacion_si:
  - text: "¡Excelente! Si ya realizaste un curso relacionado con la carrera, puedes acceder al proceso de homologación de los dos primeros semestres de esa carrera.\n\nPor ejemplo, si realizas un curso relacionado con **Educación Inicial**, puedes homologar los dos primeros semestres de la carrera de Educación Inicial. De la misma manera funciona con otros cursos.\n\nPara realizar la homologación debes presentar los siguientes requisitos:\nCopia a color de la cédula\n Certificado del título de bachiller <a href='https://servicios.educacion.gob.ec/titulacion25-web/faces/paginas/consulta-titulos-refrendados.xhtml' target='_blank' class='text-primary underline font-medium hover:opacity-80' data-novoz='true'>→ Ver certificado en línea</a>\n 2 fotos tamaño carnet\n Comprobante de depósito\n Copia del certificado UTEQ\n\n **Valor de homologación para consultinos: $89.60**\n\nEste valor cubre:\n- El cuadernillo de preguntas y respuestas de 1er y 2do semestre (base para los exámenes).\n- La apertura de la plataforma académica.\n- La creación del usuario y contraseña para acceder al sistema."

