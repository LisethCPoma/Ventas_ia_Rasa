    - type: slot
      name: carrera
      value: enfermeria
    text: "¡Excelente elección! **Enfermería** es una vocación hermosa donde aprenderás toma de signos vitales, inyectología, sueroterapia y asistencia médica para salvar vidas. Tenemos dos opciones para ti:\n- **La Carrera (2 años):** Te otorga tu título de tercer nivel (SENESCYT).\n- **El Curso (8 meses):** 100% práctico con certificaciones avaladas.\n¿Cuál de las dos opciones te llama más la atención?"
  - condition:
    - type: slot
      name: carrera
      value: emergencias medicas
    text: "¡Una profesión llena de adrenalina! En **Emergencias Médicas** aprenderás rescate, reanimación (RCP), inmovilización y atención en ambulancias. Tenemos dos opciones para ti:\n- **La Carrera (2 años):** Te otorga tu título de tercer nivel (SENESCYT).\n- **El Curso (8 meses):** 100% práctico con certificaciones avaladas.\n¿Cuál de las dos opciones te llama más la atención?"
  - condition:
    - type: slot
      name: carrera
      value: rehabilitacion fisica
