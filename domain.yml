  - text: "La gran mayoría de las carreras de la institución brindan los conocimientos prácticos y técnicos para emprender y establecer tu propio negocio o servicio. ¿Tienes en mente alguna carrera de la que quisieras confirmar opciones de negocio propio?"

  utter_homologacion:
  - condition:
    - type: slot
      name: carrera
      value: emergencias medicas
    text: "Si estudiaste en una capacitadora y quieres homologar para la carrera de Emergencias Médicas, Daniela te indicará exactamente cuáles materias se te pueden validar y el proceso a seguir.

El proceso general requiere:
- Copia de cédula
- Título de bachiller
- Certificado de la capacitadora

  ¿Te comunico con Daniela para revisar tu malla curricular ahora mismo?"
  - text: "Si ya tienes conocimientos previos o estudiaste en una capacitadora u otra institución, puedes aplicar a una homologación de materias.\n\nEl proceso general requiere:\n- Copia a color de tu cédula.\n- Certificado del título de bachiller.\n- Certificado de estudios previos, récord académico o UTQ.\n\nCada caso (como las capacitadoras) se analiza de forma individual. ¿Quieres que Daniela revise tus certificados para decirte exactamente qué materias se te pueden homologar?"

  utter_requisitos:
  - text: "¡Nos alegra que quieras formar parte del Instituto CGE!\nPara empezar tu proceso de inscripción, solo necesitas reunir:\n- Copia a color de tu cédula.\n- Certificado de tener registrado el título de bachiller (descargado de la página del internet) OBLIGATORIO.\n- 2 fotos en tamaño carnet.\n- Tu comprobante de depósito de inscripción.\n\n¡Daniela te guiará durante todo tu proceso!"

  utter_formas_pago:
  - text: "Sobre la modalidad de pago, este se realiza por **transferencia o depósito** a la cuenta oficial del Instituto.\nComo el número de cuenta y el convenio varían según tu carrera, **Daniela** te indicará por interno la cuenta exacta para que realices tu transacción de forma segura y validemos tu comprobante. ¡Te asesora en un momento!"

  utter_proceso_matricula:
  - text: "¡Estás a un paso de iniciar! El proceso oficial de matrícula es de forma **presencial** en el Instituto Superior Tecnológico Consulting Group Ecuador.\nAllí te recibiremos, te mostraremos las instalaciones y una persona encargada (como Daniela) te ayudará manualmente a llenar tus datos para dejar todo listo. ¿Te animas a visitarnos pronto?"

  utter_uniformes:
  - text: "Sí, usamos uniforme. Lo ideal es adquirirlo  en el segundo modulo de tus clases.\nTrabajamos con distribuidores autorizados que tienen convenios con el Instituto.\nComo los precios y tallas varían un poco dependiendo del uniforme de cada carrera, **Daniela** te puede facilitar los contactos de los proveedores para que lo consigas fácilmente."

