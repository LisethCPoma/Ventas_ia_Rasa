<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultina - IA ISTCGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#313089',    /* Azul oscuro ISTCGE */
                        secondary: '#3356a2',  /* Azul medio */
                        accent: '#009fe3',     /* Celeste */
                        geminiBg: '#ffffff',
                        inputBg: '#f0f4f9'     /* Gris claro estilo Gemini */
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Scrollbar minimalista y limpio */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; border: 2px solid white; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* Efecto de foco cuando está escuchando */
        .escuchando-fx {
            box-shadow: 0 0 0 4px rgba(0, 159, 227, 0.15);
            border-color: #009fe3;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-geminiBg text-gray-800 h-screen flex flex-col font-sans overflow-hidden">

    <header class="h-16 flex items-center justify-between px-6 shrink-0 z-20 bg-white/70 backdrop-blur-md border-b border-gray-100 shadow-sm sticky top-0">
        <div class="flex items-center gap-2">
            <span class="text-xl font-medium text-gray-700 tracking-wide">Consultina</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center shadow-sm">
            <span class="text-white text-sm font-medium">J</span>
        </div>
    </header>

    <div id="welcome-area" class="flex-1 flex flex-col justify-center items-center w-full max-w-4xl mx-auto px-4 pb-10 transition-all duration-300">
        <div class="w-full max-w-3xl text-left md:text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-semibold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-primary to-accent">Hola</h1>
            <h2 class="text-3xl md:text-4xl font-medium text-gray-400 mb-8">¿Por dónde empezamos?</h2>
        </div>
        
        <div id="center-input-container" class="w-full max-w-3xl">
            <div id="the-input-box" class="bg-inputBg rounded-3xl p-3 md:p-4 flex items-center gap-3 border border-transparent focus-within:bg-white focus-within:shadow-[0_4px_20px_rgba(0,0,0,0.08)] transition-all duration-300">
                <!-- Input de texto -->
                <input type="text" id="text-input" placeholder="Escribe o habla tu pregunta a Consultina..." class="bg-transparent text-gray-800 text-[15px] flex-1 pl-3 font-medium outline-none placeholder-gray-400 w-full" autocomplete="off">
                
                <!-- Botón de Enviar Texto (Oculto por defecto si el input está vacío) -->
                <button id="btn-enviar-texto" class="hidden bg-transparent text-gray-400 hover:text-primary p-3 rounded-full cursor-pointer transition-colors duration-200 outline-none flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>

                <!-- Botón de Micrófono -->
                <button id="btn-hablar" class="bg-transparent text-gray-600 hover:bg-gray-200 hover:text-primary p-3 rounded-full cursor-pointer transition-colors duration-200 outline-none flex-shrink-0">
                    <svg id="icon-mic" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" x2="12" y1="19" y2="22"></line>
                    </svg>
                </button>
            </div>
            </div>
    </div>

    <div id="chat-container" class="hidden flex-col flex-1 w-full bg-geminiBg overflow-hidden">
        
        <!-- Zona de mensajes con scroll independiente -->
        <main id="chat-box" class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto px-4 md:px-8 py-6 flex flex-col gap-6 scroll-smooth">
        </main>

        <!-- Contenedor del Input que empuja desde abajo -->
        <div class="w-full bg-gradient-to-t from-white via-white to-transparent pt-6 pb-6 px-4 shrink-0 transition-transform duration-300 transform translate-y-0 relative z-30">
            <div id="bottom-input-container" class="max-w-3xl mx-auto w-full"></div>
            
            <p class="text-center text-xs text-gray-400 mt-4 font-light">Consultina puede cometer errores. Verifica la información.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
