        - type: slot
          name: carrera
          value: laboratorio clinico
        - type: slot
          name: tipo_formacion
          value: carrera
      text: "¡Excelente elección! 💙 Con la carrera de Laboratorio Clínico te formarás a un nivel más avanzado para trabajar en el diagnóstico de enfermedades. Aprenderás a procesar y analizar muestras como sangre, orina y otros fluidos, utilizando equipos de laboratorio.\n\nAdemás, desarrollarás habilidades para interpretar resultados, aplicar controles de calidad y garantizar procesos seguros, siendo parte fundamental en el apoyo al diagnóstico médico.\n\nTe prepararás para trabajar con responsabilidad en laboratorios clínicos, hospitales y centros de salud, manejando procedimientos reales del área 🏥✨.\n\nTe recomiendo empezar por el curso de 5 meses, y te explico por qué puede ser la mejor opción para ti:\n✨ Es más económico, así puedes iniciar tu formación sin una inversión tan alta.\n🎓 Recibes múltiples certificados adicionales, lo que te da más respaldo y fortalece tu hoja de vida desde el inicio y ya podrías postular a un trabajo tanto en el sector público o privado.\n🩺 Es 100% práctico, vas a aprender haciendo, que es vital en el laboratorio.\n\nAdemás, algo muy importante 👇\nEste curso puede ser el primer paso para tu crecimiento profesional. Una vez que lo termines, puedes continuar con la carrera homologando tus estudios y así obtener tu título de tercer nivel en menos tiempo. De esta forma avanzas poco a poco, define tu vocación y tienes una base sólida 👍\n💡 Muchos estudiantes comienzan así: primero se capacitan, ganan experiencia y luego continúan con la carrera para seguir creciendo.\n\nEntonces cuéntame 😊\n¿Te gustaría empezar con el curso y luego avanzar a la carrera?"
