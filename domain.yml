  utter_voluntariado_consultinos:
  - text: "¡Así es! Muchos de nuestros estudiantes nos dicen que estudiar aquí no solo les da una profesión, sino también la oportunidad de salvar vidas y servir a la comunidad a través de nuestro programa Consultinos. ¡Es una experiencia que cambia vidas!"

  utter_refuerzo_decision:
  - text: "Si te gusta ayudar a las personas, superar retos y quieres tener una carrera con propósito, este puede ser el comienzo de algo muy grande para ti. ¡Estás en las mejores manos con Daniela para dar este paso!"

  utter_listar_oferta:
  - text: "Tenemos varias opciones para que empieces a construir tu futuro profesional.\n\nContamos con diferentes carreras diseñadas para prepararte y ayudarte a alcanzar tus metas.\nTe presentamos nuestras opciones disponibles:\n- **Área de Salud:** Técnico Superior en Enfermería, Técnico Superior en Emergencias Médicas, Técnico Superior en Rehabilitación Física, Técnico Superior en Laboratorio Clínico, Técnico Superior en Administración de Farmacias, Técnico Superior en Administración de Sistemas de la Salud.\n- **Área Educativa:** Técnico Superior en Educación Inicial.\n- **Área Empresarial y Digital:** Técnico Superior en Administración, Técnico Superior en Marketing Digital y Comercio Electrónico, Técnico Superior en Desarrollo de Contenidos y Manejo de Redes.\n- **Área Técnica y Productiva:** Técnico Superior en Mecánica Automotriz, Técnico Superior en Gastronomía.\n- **Área de Bienestar y Terapias Naturales:** Técnico Superior en Naturopatía.\n- **Área Tecnológica:** Técnico Superior en Inteligencia Artificial.\n\n¿Cuál te llama más la atención para darte información más específica?"

  utter_listar_carreras_por_area:
  - condition:
    - type: slot
      name: area_academica
      value: salud
    text: "En el área de **Salud** contamos con excelentes opciones: Técnico Superior en Enfermería, Emergencias Médicas, Rehabilitación Física, Laboratorio Clínico, Administración de Farmacias y Administración de Sistemas de la Salud.\n¿Te gustaría detalles de alguna en particular?"
  - condition:
    - type: slot
      name: area_academica
      value: educacion
    text: "En el área **Educativa** destacamos con la carrera de Tecnología Superior en Educación Inicial, muy solicitada y práctica.\n¿Quisieras conocer sus costos, duración o campo laboral?"
  - condition:
    - type: slot
      name: area_academica
      value: empresa
    text: "En el área **Empresarial y Digital** tenemos: Tecnología Superior en Administración, Marketing Digital y Comercio Electrónico, y Desarrollo de Contenidos y Manejo de Redes.\n¿De cuál te gustaría recibir más detalles?"
  - condition:
    - type: slot
      name: area_academica
      value: productividad
    text: "En el área **Técnica y Productiva** ofrecemos carreras súper prácticas: Tecnología Superior en Mecánica Automotriz y Tecnología Superior en Gastronomía.\n¿Cuál llama tu atención?"
  - condition:
    - type: slot
      name: area_academica
      value: bienestar
    text: "En el área de **Bienestar y Terapias Naturales** contamos con la Tecnología Superior en Naturopatía, perfecta si te interesa la salud alternativa.\n¿Te detallo sus costos y duración?"
  - condition:
    - type: slot
      name: area_academica
      value: tecnologia
    text: "En el área **Tecnológica** ofrecemos Tecnología Superior en Inteligencia Artificial, la carrera del futuro y de menor duración.\n¿Te cuento más sobre ella?"
  - text: "El Instituto CGE tiene muchísimas opciones agrupadas por áreas para tu comodidad. Cuéntame con tus propias palabras qué te gusta hacer o qué carrera tienes en mente para guiarte mejor."


  utter_lista_completa:
  - text: "Para darte la información exacta que necesitas, te comento que los costos, duración y modalidades varían dependiendo de la especialidad. ¿De qué carrera en particular quisieras que te dé todos los detalles?\nTenemos áreas de Salud, Educación, Empresa, Tecnología y Productividad."
  
  utter_default:
  - text: "No estoy segura de haberte entendido bien, recuerda que Daniela y yo estamos aquí para guiarte. ¿Podrías repetirme tu duda sobre nuestras carreras o los cupos disponibles?"

  utter_horarios:
  - text: "¡Claro! Nuestro horario de atención para admisiones es de lunes a domingos de 8:00 a.m. a 6:00 p.m. ¡Te esperamos!"

