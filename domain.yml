      name: carrera
      value: enfermeria
    text: "Como profesional en **Enfermería**, podrás trabajar en:\n- Asilos y casas de atención al adulto mayor.\n- Cuidado domiciliario y administración de medicamentos.\n- Instituciones de salud pública (IESS, MSP) y clínicas privadas.\n- Docencia y capacitación en salud."
  - condition:
    - type: slot
      name: carrera
      value: emergencias medicas
    text: "El campo laboral en **Emergencias Médicas** incluye:\n- Atención prehospitalaria en instituciones públicas (IESS, MSP, SGR) y privadas.\n- Departamentos de salud ocupacional en empresas productivas.\n- Posibilidad de establecer una empresa propia de atención de emergencias."
  - condition:
    - type: slot
      name: carrera
      value: rehabilitacion fisica
    text: "En **Rehabilitación Física** podrás trabajar en:\n- Instituciones de salud pública (IESS, MSP) y centros privados.\n- Centros deportivos y hogares para adultos mayores.\n- Puedes emprender y abrir tu propio centro de rehabilitación. ¿Te gustaría que te cuente sobre los costos y formas de pago?"
  - condition:
    - type: slot
      name: carrera
      value: naturopatia
    text: "El campo laboral en **Naturopatía** incluye:\n- Trabajar como terapeuta en instituciones públicas o privadas.\n- Establecimientos de productos naturales y spas.\n- Elaboración de productos de medicina natural.\n- Puedes emprender montando tu consultorio propio. ¿Te gustaría conocer los costos y formas de pago?"
  - condition:
    - type: slot
      name: carrera
      value: laboratorio clinico
    text: "Con el título de **Laboratorio Clínico** podrás desempeñarte en:\n- Consultorios, clínicas y hospitales públicos y privados.\n- Puedes establecer tu propio emprendimiento. ¿Quisieras saber los costos y opciones de financiamiento?"
  - condition:
    - type: slot
      name: carrera
      value: administracion de farmacias
    text: "En **Administración de Farmacias** podrás trabajar en:\n- Área administrativa de farmacias públicas o privadas.\n- Empresas distribuidoras de medicamentos e insumos médicos.\n- Puedes establecer tu propia empresa del rubro. ¿Te gustaría que te cuente sobre los costos y formas de pago?"
  - condition:
    - type: slot
      name: carrera
      value: administracion de sistemas de la salud
    text: "Con título en **Administración de Sistemas de Salud** podrás aplicar a:\n- Administración de hospitales, clínicas y dispensarios.\n- Dirección en empresas farmacéuticas y aseguradoras médicas.\n- Cargos en organizaciones gubernamentales del sistema nacional de salud. ¿Quieres conocer los costos y formas de pago?"
  - condition:
    - type: slot
      name: carrera
      value: administracion
    text: "En el área de **Administración** podrás:\n- Desempeñarte en áreas financieras y contables de empresas de todo nivel.\n- Formar parte de áreas gerenciales y logísticas.\n- Establecer tu propia empresa y aplicar tus conocimientos. ¿Te gustaría conocer los costos de la carrera?"
  - condition:
    - type: slot
      name: carrera
      value: educacion inicial
    text: "Para **Educación Inicial**, las salidas laborales incluyen:\n- Docencia en unidades educativas, colegios y escuelas.\n- Gestión y dirección de centros de desarrollo infantil y guarderías.\n- Emprender tu propio centro educativo o de nivelación. ¿Quisieras conocer los costos y cuotas?"
  - condition:
    - type: slot
      name: carrera
      value: marketing digital
    text: "Al graduarte en **Marketing Digital** podrás desempeñarte como:\n- Líder de un departamento de ventas y ecosistema digital.\n- Community manager y gestor de tráfico pubilicitario.\n- Investigación y analista digital de mercados.\n- Establecer tu propia agencia de marketing y redes. ¿Deseas saber los costos y métodos de pago?"
  - condition:
    - type: slot
      name: carrera
      value: gastronomia
    text: "En la carrera de **Gastronomía**, podrás aplicar tus conocimientos trabajando en:\n- Restaurantes de primer nivel, cruceros y hoteles.\n- Empresas de catering y eventos.\n- O, por supuesto, emprender y consolidar tu propio restaurante. ¿Quisieras saber los costos de Gastronomía?"
  - condition:
    - type: slot
      name: carrera
      value: mecanica automotriz
    text: "Para **Mecánica Automotriz**, tu campo laboral será en:\n- Concesionarias como mecánico.\n- Asesor técnico en empresas grandes de transporte.\n- Fábricas de ensamblaje y centros de revisión vehicular.\n- También la posibilidad de abrir tu propio taller o centro mecánico. ¿Te gustaría saber cuánto cuesta esta carrera?"
  - condition:
    - type: slot
      name: carrera
      value: inteligencia artificial
    text: "Al graduarte en **Inteligencia Artificial** podrás desempeñarte como:\n- Desarrollador de soluciones de IA.\n- Analista de datos y automatización.\n- Consultor tecnológico.\n- O emprender tu propia agencia de tecnología. ¿Deseas conocer los costos y facilidades de pago?"
  - text: "El campo laboral depende de la carrera que elijas. Por ejemplo, te preparamos para que puedas trabajar en hospitales, en escuelas, o desarrollar tu propia empresa."

