  utter_preguntar_homologacion_inicial:
  - text: "¡Claro! Antes de explicarte el proceso de homologación, me gustaría saber algo importante:\n\n¿Ya realizas algún curso de capacitación con nosotros relacionados con la carrera que deseas estudiar?"

  utter_homologacion_si:
  - text: "¡Excelente! Si ya realizaste un curso relacionado con la carrera, puedes acceder al proceso de homologación de los dos primeros semestres de esa carrera.\n\nPor ejemplo, si realizas un curso relacionado con **Educación Inicial**, puedes homologar los dos primeros semestres de la carrera de Educación Inicial. De la misma manera funciona con otros cursos.\n\nPara realizar la homologación debes presentar los siguientes requisitos:\nCopia a color de la cédula\n Certificado del título de bachiller (descargado desde la página de internet)\n 2 fotos tamaño carnet\n Comprobante de depósito\n Copia del certificado UTEQ\n\n **Valor de homologación para consultinos: $89.60**\n\nEste valor cubre:\n- El cuadernillo de preguntas y respuestas de 1er y 2do semestre (base para los exámenes).\n- La apertura de la plataforma académica.\n- La creación del usuario y contraseña para acceder al sistema."

  utter_homologacion_no:
  - text: "En ese caso, primero deberías realizar uno de nuestros cursos de capacitación, ya que estos permiten posteriormente acceder al proceso de homologación cuando decidas continuar con la carrera.\n\nMuchos estudiantes comienzan por los cursos porque tienen varios beneficios:\n- Obtienen **certificados de capacitación**.\n- Permite avanzar más rápido en la carrera posteriormente mediante la homologación.\n- Ayuda a descubrir y confirmar la vocación profesional.\n- Es una forma más económica de iniciar en el área de interés.\n- Desde el curso ya se realizan prácticas 100% reales, lo que permite adquirir experiencia desde el inicio."

  utter_homologacion_externos:
  - text: "En el caso de homologación para personas externas, este proceso se maneja de forma más personalizada.\n\nNuestro Instituto Superior Tecnológico Consulting Group Ecuador se caracteriza por brindar formación de calidad. Por esta razón, la información específica sobre homologación para estudiantes externos puede brindártela directamente mi asistente**Daniela**, quien podrá orientarte de manera más detallada según tu caso."

  utter_requisitos:
  - text: "¡Nos alegra que quieras formar parte del Instituto CGE!\nPara empezar tu proceso de inscripción, solo necesitas reunir:\n- Copia a color de tu cédula.\n- Certificado de tener registrado el título de bachiller (descargado de la página del internet) OBLIGATORIO.\n- 2 fotos en tamaño carnet.\n- Tu comprobante de depósito de inscripción.\n\n¡Mi asistente Daniela te guiará durante todo tu proceso!"

  utter_formas_pago:
  - text: "Sobre la modalidad de pago, este se realiza por **transferencia o depósito** a la cuenta oficial del Instituto.\nComo el número de cuenta y el convenio varían según tu carrera, mi asistente **Daniela** te indicará por interno la cuenta exacta para que realices tu transacción de forma segura y validemos tu comprobante. ¡Te asesora en un momento!"

  utter_proceso_matricula:
  - text: "¡Estás a un paso de iniciar! El proceso oficial de matrícula es de forma **presencial** en el Instituto Superior Tecnológico Consulting Group Ecuador.\nAllí te recibiremos, te mostraremos las instalaciones y una persona encargada (mi asistente Daniela) te ayudará manualmente a llenar tus datos para dejar todo listo. ¿Te animas a visitarnos pronto?"

  utter_uniformes:
  - text: "¡Sí usamos uniformes! Pero nosotros no lo vendemos. Les recordamos que CGE es un organismo de interés nacional con personería jurídica dada por el Ministerio de Salud Pública y reconocida como voluntaria cooperante de la Secretaría Nacional de Gestión de Riesgos. Por seguridad de nuestros pacientes y hospitales, los uniformes se hacen solo en lugares autorizados."

  utter_horarios_clases:
  - text: "Tenemos varios horarios a escoger (matutinos, nocturnos, fines de semana, etc.), pero te recordamos que los cupos son limitados.\n\nPor procesos de calidad internacionales, **solo recibimos hasta 25 personas por curso**.\n\nSi quieres saber qué horarios tenemos disponibles, esta información privada te la puede entregar **Daniela**, mi asistente humana."

  utter_malla_curricular:
  - text: "¡Excelente pregunta! Lo que vas a aprender depende de la opción que elijas:\n\n **Si eliges la Carrera de 2 años:** El pensum es avanzado y súper completo.\n\n**Si eliges el Curso Corto:** Aprenderás habilidades 100% prácticas desde el primer día (como inyectología, curaciones, o manejo de niños según tu área).\n\n¿Te interesa conocer que aprenderás?"

  utter_ubicacion:
  - text: "El Instituto Superior Tecnológico Consulting Group Ecuador cuenta con **32 sedes a nivel nacional**.\n\nPara indicarte la sede más cercana a tu domicilio o provincia, mi asistente Daniela se pondrá en contacto contigo enseguida con todas las direcciones oficiales."


  # ======================== CAPACITADORA ========================
  utter_cursos_capacitadora:
  - text: "¡Excelente! En la Capacitadora CGE contamos con cursos diseñados para que aprendas habilidades 100% prácticas y las apliques de inmediato en el mundo real.\n\nAntes de mostrarte todas las opciones, me encantaría saber un poco más de ti: **¿Dónde te visualizas en el futuro?**\n\n¿Te imaginas **salvando vidas** en un hospital, atendiendo emergencias llenas de adrenalina en una **ambulancia**, llenando de alegría y enseñando a **niños**, o tal vez trabajando con la fuerza de los motores en un taller mecánico?\n\n¡Cuéntame qué te apasiona para guiarte hacia el curso perfecto para ti! \n(O si prefieres ver todo los cursos que CGE ofrece, simplemente dime 'quiero ver todos los cursos' y te mostrare todas las opciones que tenemos disponibles para ti!)."

  utter_requisitos_capacitadora:
  - text: "¡Qué bueno que quieras formar parte de CGE! Para inscribirte y comenzar tu formación solo debes cumplir con algunos requisitos básicos.\n\nLos documentos que debes presentar son:\nCopia de cédula de la persona que se va a inscribir\nCopia de cédula del representante (sólo mamá o papá)\nTítulo de bachiller (opcional)\nComprobante de pago del primer módulo\n\nEn caso de no contar con el título de bachiller, no te preocupes. Deberás firmar un **acta de compromiso**, donde te comprometes a culminar el bachillerato.\n\nSi tienes alguna situación especial respecto al representante, lo más recomendable es consultarlo directamente con mi asistente **Daniela**, quien podrá orientarte según el caso."

  utter_costos_capacitadora:
  - text: "Nuestros cursos te pueden salir **GRATIS** gracias a nuestro Plan de Ayuda, o puedes aprovechar nuestra **promoción especial 2x1** por $60.06 (o $61.44 pagando con la app 'De Una').\n\nAdemás, la inscripción y la matrícula son **completamente gratuitas**.\n\nTe podemos explicar mejor de los valores exactos y los descuentos que tenemos hoy con Daniela, mi asistente humana.\n\nY recuerda que todos los valores que tú dejes en CGE nos ayuda a salvar vidas."
  
  utter_uniformes_capacitadora:
  - text: "¡Sí usamos uniformes! Pero nosotros no lo vendemos. Les recordamos que CGE es un organismo de interés nacional con personería jurídica dada por el Ministerio de Salud Pública y reconocida como voluntaria cooperante de la Secretaría Nacional de Gestión de Riesgos. Por seguridad de nuestros pacientes y hospitales, los uniformes se hacen solo en lugares autorizados."

  utter_que_aprenderas_capacitadora:
  - text: "En la Capacitadora CGE nuestros cursos están diseñados para que puedas aprender habilidades prácticas reales dentro de cada área.\n\nTe comparto lo que aprenderás en cada uno de nuestros cursos:\n\n**Enfermería**\nAprenderás sobre el cuidado de pacientes dentro de clínicas, hospitales, casas de salud y centros geriátricos. Actividades:\n- Medición de signos vitales\n- Inyectología y sueroterapia\n- Curaciones de heridas y suturas\n- Participación en áreas como quirófano, UCI y salas hospitalarias.\n\n**Emergencias Médicas**\nGracias a nuestras ambulancias, atenderás emergencias 100% reales. Aprenderás:\n- Reanimación avanzada y medición de signos vitales avanzados\n- Suturas avanzadas, inyectología y sueroterapia\n- Atención de traumas y quemaduras.\n\n**Rehabilitación Física**\nSe enfoca en ayudar a los pacientes a recuperar su movilidad, fuerza y vitalidad después de lesiones o accidentes mediante diferentes terapias.\n\n**Laboratorio Clínico**\nAprenderás sobre:\n- Extracción, recepción y entrega de resultados de muestras\n- Indicaciones al paciente\n- Limpieza y manejo del laboratorio.\n\n**Naturopatía**\nSe enfoca en el bienestar físico y emocional a través de terapias naturales. Incluye:\n- Registro de historial natural de salud\n- Asistencia en consultas y preparación de productos naturales\n- Apoyo en masajes naturales.\n\n**Odontología**\nAprenderás a:\n- Asistir en intervenciones odontológicas y apoyo administrativo\n- Preparar instrumental, resinas, cementos o alginatos para impresiones\n- Realizar control de inventario.\n\n**Farmacia**\nManejo de medicamentos para su venta y administración adecuada:\n- Nombres genéricos y comerciales\n- Dosificación, vía de administración y efectos secundarios.\n\n**Veterinaria**\nCuidado de especies mayores y menores. Aprenderás:\n- Medición de signos vitales, suturas, inyectología y sueroterapia\n- Preparación de instrumentos y asistencia en cirugías\n- Administración de medicamentos bajo supervisión.\n\n**Educación Inicial**\nCuidado y desarrollo de niños desde los 0 años:\n- Recreación, estimulación temprana y pintado de caritas\n- Colaboración con docentes y fomento de hábitos de convivencia.\n\n**Taller de Inyectología**\nTaller 100% práctico (sin prácticas adicionales) donde aprenderás a:\n- Colocar sueros y aplicar inyecciones de forma profesional.\n\n**Mecánica básica de motos para mujeres**\nAprenderás sobre:\n- Sistema de transmisión, frenos, suspensión, sistema eléctrico, encendido y mantenimiento preventivo.\n\n**Mecánica básica de vehículos (Personal de salud)**\nAprenderás a actuar ante:\n- Pérdida de frenos o potencia, vehículo varado, sobrecalentamiento y fallas eléctricas.\n\n**Flores de Bach**\nBienestar emocional a través de esencias florales naturales. Aprenderás a:\n- Identificar emociones (estrés, ansiedad, depresión)\n- Dosificar esencias y aplicar terapias naturales para el equilibrio integral.\n\nSi deseas, puedo ayudarte también a conocer la duración o el costo del curso que te interesa."

  utter_practicas_capacitadora:
  - text: "En CGE creemos que la mejor forma de aprender es practicando en entornos reales.\n\nPor eso, nuestros cursos cuentan con prácticas o voluntariados reales, y además tenemos convenios con diferentes instituciones, lo que permite que los estudiantes adquieran experiencia desde su formación.\n\nTe explico cómo funcionan las prácticas según el curso:\n\n**Enfermería**\nLas prácticas se realizan con pacientes 100% reales. CGE cuenta con convenios en instituciones públicas y privadas, por lo que la institución se encarga de asignar el lugar de práctica. Esto permite que los estudiantes se den a conocer, abriendo puertas en el ámbito laboral.\n\n**Emergencias Médicas**\nLas prácticas se realizan atendiendo emergencias 100% reales gracias a nuestras ambulancias avanzadas vinculadas al **ECU 911**. También existen convenios con clínicas y hospitales públicos y privados.\n\n**Rehabilitación Física**\nLas prácticas se realizan en clínicas, hospitales y centros de rehabilitación. Además, CGE cuenta con **su propio centro de rehabilitación**.\n\n**Laboratorio Clínico**\nLas prácticas se realizan en clínicas, hospitales y laboratorios externos.\n\n**Naturopatía**\nSe realizan prácticas 100% reales en centros de naturopatía con los que CGE tiene convenios (como KIRI).\n\n** Odontología**\nLos estudiantes realizan prácticas en clínicas y hospitales del sector público y privado.\n\n**Farmacia**\nLas prácticas se realizan en clínicas y hospitales, así como en redes de farmacias como Farmacias Económicas, Cruz Azul y Santa Marta.\n\n**Veterinaria**\nLas prácticas se realizan con casos reales en clínicas veterinarias.\n\n**Educación Inicial**\nLas prácticas se realizan en unidades educativas y guarderías. Además, contamos con nuestra propia guardería llamada **“Rincón Kid CGE”**.\n\n**Mecánica básica de vehículos (Personal de salud)**\nLas prácticas se realizan dentro de la capacitadora, en talleres donde se trabaja con experiencia real.\n\n**Mecánica básica de motos para mujeres**\nLas prácticas también se realizan dentro de la capacitadora con experiencia directa en el área.\n\n**Flores de Bach**\nLas prácticas se realizan de manera interna durante todo el curso. Se trabaja con ejercicios prácticos para aprender a aplicar terapias de esecias florales para el bienestar emocional y energético.\n\n¿Te gustaría realizar un curso en el área de salud, educación o mecánica?*"

  utter_certificados_capacitadora:
  - text: "¡Claro! Al finalizar nuestros cursos en la Capacitadora CGE, los estudiantes reciben entre **8 y 10 certificados**, lo que fortalece mucho su perfil profesional.\n\nEntre los certificados que reciben se encuentran:\n- Certificado avalado por la **Universidad Técnica Estatal de Quevedo (UTEQ)**\n- Certificado del **Instituto Superior Tecnológico Consulting Group Ecuador**\n- Certificado de la **Asociación Ecuatoriana de Operadoras y Capacitadoras de la Salud (AEOCAS)**\n- Certificación de la **Asociación de Auxiliares de Enfermería del Ecuador**\n\nAdemás, durante el proceso de formación se pueden recibir otros certificados adicionales relacionados con las áreas de capacitación.\n\nEsto permite que los estudiantes respalden sus conocimientos con varias certificaciones, lo cual es una gran ventaja al momento de buscar oportunidades dentro del ámbito laboral o continuar con su formación profesional.\n\n*¿Te gustaría que te ayude a revisar los requisitos para inscribirte en alguno de nuestros cursos?*"

  utter_senescyt_capacitadora:
  - text: "Es una excelente pregunta. La **SENESCYT** es el ente encargado de registrar los títulos de educación superior, como los que otorgan universidades e institutos tecnológicos.\n\nEn el caso de nuestros cursos de la Capacitadora CGE, los estudiantes reciben **certificados de capacitación**, los cuales respaldan la formación que han adquirido y pueden ayudarles a desempeñarse tanto en el sector público como privado dependiendo del área.\n\nAhora bien, si posteriormente decides continuar tus estudios con nosotros en el **Instituto Superior Tecnológico Consulting Group Ecuador**, allí sí obtendrás un **título de tercer nivel**, el cual se registra en la SENESCYT.\n\nMuchos estudiantes comienzan con un curso porque les permite adquirir experiencia, definir su vocación y luego continuar con su carrera profesional dentro del instituto."

  utter_materiales_capacitadora:
  - text: "Es una muy buena pregunta. En los cursos de la Capacitadora CGE, los materiales que se utilizarán se van coordinando **progresivamente** conforme avanza la formación.\n\nEsto significa que, a medida que vayas avanzando en tu preparación, el docente te irá indicando poco a poco cuáles son los materiales específicos que se utilizarán en cada etapa del curso.\n\nDe esta manera, puedes organizarte mejor y adquirir **solo lo necesario en el momento adecuado**, según las actividades prácticas que se vayan realizando durante la capacitación.\n\nSi ya tienes claro qué curso te gustaría seguir, avísame y te ayudo con los requisitos de inscripción."

  utter_horarios_practicas_capacitadora:
  - text: "¡No te preocupes por tus prácticas! Nosotros **respetamos tu tiempo**.\n\nSi estás estudiando o trabajando, en tu tiempo libre te podemos ubicar tus prácticas. CGE, al ser el organismo de formación más grande y premiado del país, tiene convenios con las instituciones más importantes del Ecuador, por ende, hay muchos lugares con horarios flexibles donde tú podrás realizarlas."

  utter_horarios_cursos_capacitadora:
  - text: "Tenemos varios horarios a escoger (clases teóricas y prácticas), pero te recordamos que los cupos son sumamente limitados.\n\nPor procesos de calidad internacionales, **solo recibimos hasta 25 personas por curso**.\n\nSi quieres saber qué horarios exactos tenemos disponibles, esta información privada te la puede entregar **Daniela**, mi asistente humana."

  utter_trabajo_capacitadora:
  - text: "En CGE nos enfocamos en preparar a nuestros estudiantes de forma práctica y profesional, brindándoles las herramientas teóricas y prácticas necesarias para desenvolverse en el ámbito laboral.\n\nDurante la formación, los estudiantes adquieren **experiencia real a través de prácticas**, lo cual les permite desarrollar habilidades que son muy valoradas en diferentes áreas del sector público y privado.\n\nAdemás, al realizar prácticas en instituciones, clínicas, empresas o centros relacionados con su área, los estudiantes tienen la oportunidad de **darse a conocer profesionalmente**, lo cual muchas veces abre puertas directas dentro del campo laboral.\n\nNuestro objetivo es que cada estudiante salga preparado, con experiencia y con la confianza necesaria para desenvolverse en su área profesional.\n\n¿En qué área te gustaría prepararte para empezar a construir tu camino profesional?"

  utter_becas_capacitadora:
  - text: "Por el momento no contamos con un programa de becas activas, pero sí tenemos **descuentos y promociones** disponibles para quienes desean comenzar su formación con nosotros.\n\nAlgo muy importante que debes saber es que **la inscripción y la matrícula son completamente gratuitas**.\n\nEl pago inicial que realizas no corresponde a una inscripción, sino que es directamente el pago de tu **primera mensualidad** del curso.\n\nAdemás, los cursos que normalmente tienen un valor aproximado de $72.50 pueden acceder a descuentos adicionales en la mensualidad, dependiendo de las campañas vigentes.\n\nPara conocer qué descuento o promoción se puede aplicar en tu caso, mi asistente **Daniela** puede brindarte la información más actualizada.\n\n¿Te gustaría que te ponga en contacto con ella para que revisen los beneficios disponibles para ti?"
  
  utter_costo_certificacion_capacitadora:
  - text: "Nosotros **no cobramos certificados**. Sí hay un valor por procesos de certificación y auditoría educativa de algunos entes de evaluación.\n\nTú vas a recibir mínimo 5 certificados por curso, pero todo esto dependerá de las promociones que estén vigentes.\n\nY recuerda que todos los valores que tú dejes en CGE nos ayuda a salvar vidas."

  utter_fecha_inscripcion_capacitadora:
  - text: "Las inscripciones normalmente se realizan **uno o dos días antes** de la fecha de inicio del curso.\n\nSin embargo, si realizas tu inscripción con anticipación es mucho mejor, ya que así puedes asegurar tu cupo, especialmente porque los cursos manejan **cupos limitados**.\n\nSi ya tienes interés en algún curso, lo ideal es realizar el proceso lo antes posible para garantizar tu espacio.\n\n¿Te gustaría saber cuantos cupos hay disponibles para algun curso en especifico?"

  utter_horarios_voluntariado_capacitadora:
  - text: "Los horarios de los voluntariados se coordinan directamente con mi asistente **Daniela**, quien es la persona encargada de brindarte la información actualizada y orientarte sobre la disponibilidad de horarios según tu curso.\n\nSi deseas participar en los voluntariados, ella podrá indicarte los días, horarios y cómo integrarte al proceso de forma exitosa."

  utter_codigo_fuente:
  - text: "Esta Inteligencia Artificial está realizada con todas las medidas de seguridad, por lo tanto, no podemos otorgar esa información. Sin embargo, si quieres aprender más y vencerme, puedes aprender más en nuestra preparación de Inteligencia Artificial."

  utter_competencia:
  - text: "La competencia de Consulting Group Ecuador a nivel institucional y de liderazgo es la **Universidad San Francisco (USFQ)** y la **Universidad de las Américas (UDLA)**."

