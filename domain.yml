responses:
  utter_saludo_consultina:
    - text: "👋 ¡Hola, mucho gusto! Te damos la bienvenida al organismo de formación y titulación más grande, completo y premiado del país. 🏆"

  utter_saludo:
    - text: "👋 ¡Hola, mucho gusto! Te damos la bienvenida al organismo de formación y titulación más grande, completo y premiado del país. 🏆 ¿Qué información te gustaría conocer hoy?"

  utter_identidad:
    - text: "👋 ¡Hola! Soy **Consultina**, la asistente virtual inteligente oficial de Consulting Group Ecuador. 🤖\n\nEstoy aquí para guiarte, resolver todas tus dudas sobre nuestras carreras y cursos, y ayudarte a dar el primer paso hacia tu futuro profesional. 🎯 ¿En qué te puedo ayudar hoy?"

  utter_veracidad:
    - text: "✅ ¡Para nada! Como asistente de ventas oficial con el respaldo de Gemini, Claude, ChatGPT y otros modelos de lenguaje, garantizo que toda la información que se te proporciona es completamente verídica y verificada. 🔒"

  utter_instituto_premiado:
    - text: "🏅 A nivel nacional, sacando el grupo de las universidades, el **Instituto Superior Tecnológico Consulting Group Ecuador (ISTCGE)** es la institución de educación superior técnica y tecnológica más reconocida y premiada del país.\n\nCuenta con aval oficial de las autoridades, el respaldo del holding educativo Consulting Group Ecuador con más de dos décadas de trayectoria y 32 sedes a nivel nacional 📍, y es referente de excelencia institucional con los más altos estándares desde su fundación. 🌟"

  # ======================== INSTITUTO ========================
  utter_reaccion_carrera:
    # --- EXCEPCIONES: ÁREAS QUE SON EXCLUSIVAMENTE CURSOS CORTOS ---
    - condition:
        - type: slot
          name: carrera
          value: odontologia
      text: "¡Excelente elección! Para **Odontología** contamos exclusivamente con nuestro **Curso de Capacitación** (5 meses). Aquí aprenderás a cuidar sonrisas. Te enseñaremos a manejar el instrumental dental y los materiales necesarios para tratamientos, además de cómo esterilizar todo para garantizar la seguridad de los pacientes. Asistirás al odontólogo y serás parte del equipo que ayuda a las personas a mantener su salud bucal. ¡Y muchas cosas más!\n¿Te gustaría conocer los costos o los requisitos para inscribirte?"
    - condition:
        - type: slot
          name: carrera
          value: veterinaria
      text: "¡Qué hermosa vocación! Para **Veterinaria** contamos exclusivamente con nuestro **Curso de Capacitación** (8 meses). Aquí, tu pasión por los animales te llevará a ayudar a aquellos que no pueden hablar. Aprenderás a proporcionar primeros auxilios, conocerás la anatomía y te capacitarás en la medicación y en cómo asistir en cirugías para salvar a las mascotas. ¡Y muchas cosas más!\n¿Te gustaría conocer los costos o los requisitos?"
    - condition:
        - type: slot
          name: carrera
          value: flores de bach
      text: "¡Qué interesante! Para **Flores de Bach** contamos exclusivamente con nuestro **Curso de Capacitación** (4 meses). Descubrirás cómo usar las esencias de las flores naturales para ayudar a las personas a calmar la ansiedad, quitar el estrés y curar sus emociones de una forma muy tranquila. Tu conocimiento será una herramienta poderosa para el equilibrio emocional. ¡Y muchas cosas más!\n¿Te gustaría conocer los costos o los requisitos?"
    - condition:
        - type: slot
          name: carrera
          value: inyectologia
      text: "¡Excelente elección! Para **Inyectología** contamos exclusivamente con un **Taller Práctico** de 1 mes. Te enseñaremos a canalizar vías, aplicar inyecciones y administrar sueros, en un trabajo práctico y seguro, para que puedas asistir en emergencias o tratamientos médicos. Te convertirás en un experto en proporcionar alivio y cuidado a los pacientes. ¡Y muchas cosas más!\n¿Te gustaría conocer los costos para iniciar?"

    # --- ÁREAS QUE TIENEN AMBAS (CARRERA DE 2 AÑOS Y CURSO CORTO) ---

    # 1. ENFERMERÍA
    - condition:
        - type: slot
          name: carrera
          value: enfermeria
        - type: slot
          name: tipo_formacion
          value: curso
      text: "¡Excelente decisión! 🩺 En el Curso de Enfermería aprenderás a cuidar a los pacientes de manera directa, lo que incluye la medición de signos vitales, sueroterapia e inyección, además de realizar curaciones y asistir a los médicos en diferentes procedimientos. También tendrás la oportunidad de ingresar a áreas como quirófano, UCI y salas de hospitalización, desarrollando experiencia real en el entorno de salud. Te convertirás en un apoyo fundamental para quienes más lo necesitan, brindando no solo atención, sino también empatía y confianza 💙\n\n¿Qué te gustaría conocer ahora del curso? ¿Los costos, los requisitos, o su duración?"
    - condition:
        - type: slot
          name: carrera
          value: enfermeria
        - type: slot
          name: tipo_formacion
          value: carrera
      text: "¡Excelente elección! 💙 Con la carrera de Enfermería aprenderás a brindar atención directa al paciente, ofrecer apoyo en procedimientos médicos, realizar tareas administrativas del área de salud y aplicar la correcta higiene y control del entorno, preparándote de manera integral para desempeñarte con seguridad y responsabilidad en clínicas y hospitales 🏥✨.\n\nTe recomiendo empezar por el curso de 8 meses, y te explico por qué puede ser la mejor opción para ti:\n✨ Es más económico, así puedes iniciar tu formación sin una inversión tan alta.\n🎓 Recibes de 8 a 10 certificados adicionales, lo que te da más respaldo y fortalece tu hoja de vida desde el inicio y ya podrías postular a un trabajo tanto en el sector público o privado.\n🩺 Es 100% práctico que es lo más importante en el área de salud.\n\nAdemás, algo muy importante 👇\nEste curso puede ser el primer paso para tu crecimiento profesional. Una vez que lo termines, puedes continuar con la **carrera en tan solo 1 año adicional** y así obtener tu título de tercer nivel. De esta forma avanzas poco a poco, defines tu vocación y tienes una base sólida 👍\n💡 Muchos estudiantes comienzan así: primero se capacitan, ganan experiencia y luego continúan con la carrera para seguir creciendo.\n\nEntonces cuéntame 😊\n¿Te gustaría empezar con el curso y luego avanzar a la carrera?"
    - condition:
        - type: slot
          name: carrera
          value: enfermeria
      text: "¡Excelente elección! 💙 Con la carrera de Enfermería aprenderás a brindar atención directa al paciente, ofrecer apoyo en procedimientos médicos, realizar tareas administrativas del área de salud y aplicar la correcta higiene y control del entorno, preparándote de manera integral para desempeñarte con seguridad y responsabilidad en clínicas y hospitales 🏥✨.\n\nTe recomiendo empezar por el curso de 8 meses, y te explico por qué puede ser la mejor opción para ti:\n✨ Es más económico, así puedes iniciar tu formación sin una inversión tan alta.\n🎓 Recibes de 8 a 10 certificados adicionales, lo que te da más respaldo y fortalece tu hoja de vida desde el inicio y ya podrías postular a un trabajo tanto en el sector público o privado.\n🩺 Es 100% práctico, vas a aprender haciendo, que es lo más importante en el área de salud.\n\nAdemás, algo muy importante 👇\nEste curso puede ser el primer paso para tu crecimiento profesional. Una vez que lo termines, puedes continuar con la **carrera en tan solo 1 año adicional** y así obtener tu título de tercer nivel. De esta forma avanzas poco a poco, defines tu vocación y tienes una base sólida 👍\n💡 Muchos estudiantes comienzan así: primero se capacitan, ganan experiencia y luego continúan con la carrera para seguir creciendo.\n\nEntonces cuéntame 😊\n¿Te gustaría empezar con el curso y luego avanzar a la carrera?"

