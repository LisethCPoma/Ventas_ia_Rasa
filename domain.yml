  utter_saludo_consultina:
  - text: "¡Hola! Mucho gusto. Soy Consultina. Estoy aquí para ayudarte a conocer todo sobre nuestras carreras y acompañarte en este proceso para que tomes una gran decisión para tu futuro."

  utter_saludo:
  - text: "¡Hola! Mucho gusto. Soy Consultina. Estoy aquí para ayudarte a conocer todo sobre nuestras carreras y acompañarte en este proceso para que tomes una gran decisión para tu futuro. ¿Qué información te gustaría conocer hoy?"

  utter_veracidad:
  - text: "¡Para nada! Como asistente oficial del Instituto, te garantizo que toda la información que te proporciono es completamente verídica y verificable. Mi objetivo es darte datos reales para que tomes la mejor decisión para tu futuro."

  utter_instituto_premiado:
  - text: "A nivel nacional, sacando el grupo de las universidades, el **Instituto Superior Tecnológico Consulting Group Ecuador (ISTCGE)** es la institución de educación superior técnica y tecnológica más reconocida y premiada del país.\n\nContamos con aval oficial de las autoridades, el respaldo del holding educativo Consulting Group Ecuador con más de dos décadas de trayectoria y 32 sedes a nivel nacional, y somos referentes de excelencia institucional con los más altos estándares desde nuestra fundación."

