      text: "Con título en **Administración de Sistemas de Salud** podrás aplicar a:\n- Administración de hospitales, clínicas y dispensarios.\n- Dirección en empresas farmacéuticas y aseguradoras médicas.\n- Cargos en organizaciones gubernamentales del sistema nacional de salud.\n\n¿Quieres conocer en dónde harás tus prácticas o las formas de pago? 😊"

    - condition:
        - type: slot
          name: carrera
          value: administracion
      text: "En el área de **Administración** podrás:\n- Desempeñarte en áreas financieras y contables de empresas de todo nivel.\n- Formar parte de áreas gerenciales y logísticas.\n- Establecer tu propia empresa y aplicar tus conocimientos.\n\n¿Te gustaría conocer los lugares de prácticas o los costos de la carrera? 😊"

    - condition:
        - type: slot
          name: carrera
          value: educacion inicial
      text: "Para **Educación Inicial**, las salidas laborales incluyen:\n- Docencia en unidades educativas, colegios y escuelas.\n- Gestión y dirección de centros de desarrollo infantil y guarderías.\n- Emprender tu propio centro educativo o de nivelación.\n\n<img src='assets/images/educacioninicial1.jpeg' class='w-64 md:w-72 h-auto rounded-xl mt-3 shadow-sm border border-gray-100'>\n\n¿Te gustaría saber en dónde realizarás tus prácticas con los niños, o prefieres conocer los costos? 😊"

    - condition:
        - type: slot
          name: carrera
          value: educacion basica
      text: "Para **Educación Básica**, las salidas laborales incluyen:\n- Docencia en unidades educativas, colegios y escuelas de educación básica.\n- Diseño de material didáctico y proyectos educativos.\n- Emprender tu propio centro de nivelación académica.\n\n¿Quisieras conocer en dónde harás tus prácticas o ver las cuotas disponibles? 😊"

    - condition:
        - type: slot
          name: carrera
          value: marketing digital
      text: "Al graduarte en **Marketing Digital** podrás desempeñarte como:\n- Líder de un departamento de ventas y ecosistema digital.\n- Community manager y gestor de tráfico publicitario.\n- Investigación y analista digital de mercados.\n- Establecer tu propia agencia de marketing y redes.\n\n¿Deseas saber dónde realizarás tus prácticas o ver los métodos de pago? 😊"

    - condition:
        - type: slot
          name: carrera
          value: gastronomia
      text: "En la carrera de **Gastronomía**, podrás aplicar tus conocimientos trabajando en:\n- Restaurantes de primer nivel, cruceros y hoteles.\n- Empresas de catering y eventos.\n- O, por supuesto, emprender y consolidar tu propio restaurante.\n\n¿Quisieras saber en dónde harás tus prácticas o ver los costos de Gastronomía? 😊"

    - condition:
        - type: slot
          name: carrera
          value: mecanica automotriz
      text: "Para **Mecánica Automotriz**, tu campo laboral será en:\n- Concesionarias como mecánico.\n- Asesor técnico en empresas grandes de transporte.\n- Fábricas de ensamblaje y centros de revisión vehicular.\n- También la posibilidad de abrir tu propio taller o centro mecánico.\n\n¿Te gustaría saber dónde realizarás tus prácticas o cuánto cuesta esta carrera? 😊"

    - condition:
        - type: slot
          name: carrera
          value: desarrollo de contenidos y manejo de redes
      text: "Al graduarte en **Desarrollo de Contenidos y Manejo de Redes** podrás trabajar en áreas como gestión de redes sociales, creación de contenido digital, community management, o apoyo en estrategias de comunicación digital para empresas y marcas, así como también desarrollar proyectos propios.\n\n¿Te gustaría saber en qué empresas harás tus prácticas o conocer los costos? 😊"

    - condition:
        - type: slot
          name: carrera
          value: inteligencia artificial
      text: "Al graduarte en **Inteligencia Artificial** podrás desempeñarte en áreas como el desarrollo de soluciones basadas en IA, análisis de datos e inteligencia de negocio, transformando grandes volúmenes de información en decisiones estratégicas, o incluso emprender tus propios proyectos tecnológicos.\n\n¿Deseas conocer dónde realizarás tus prácticas o las facilidades de pago? 😊"

    # --- FALLBACK GENERAL (SIEMPRE DEBE IR AL FINAL) ---
