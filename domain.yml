  utter_preguntar_homologacion_inicial:
    - text: "🤔 ¡Claro! Antes de explicarte el proceso de homologación, me gustaría saber algo importante:\n\n¿Ya realizas algún curso de capacitación con nosotros relacionados con la carrera que deseas estudiar?"

  utter_homologacion_si:
    - text: "¡Excelente! Si ya realizaste un curso relacionado con la carrera, puedes acceder al proceso de homologación de los dos primeros semestres de esa carrera.\n\nPor ejemplo, si realizas un curso relacionado con **Educación Inicial**, puedes homologar los dos primeros semestres de la carrera de Educación Inicial. De la misma manera funciona con otros cursos.\n\nPara realizar la homologación debes presentar los siguientes requisitos:\nCopia a color de la cédula\n Certificado del título de bachiller <a href='https://servicios.educacion.gob.ec/titulacion25-web/faces/paginas/consulta-titulos-refrendados.xhtml' target='_blank' class='text-primary underline font-medium hover:opacity-80' data-novoz='true'>→ Ver certificado en línea</a>\n 2 fotos tamaño carnet\n Comprobante de depósito\n Copia del certificado UTEQ\n\n **Valor de homologación para consultinos: $89.60**\n\nEste valor cubre:\n- El cuadernillo de preguntas y respuestas de 1er y 2do semestre (base para los exámenes).\n- La apertura de la plataforma académica.\n- La creación del usuario y contraseña para acceder al sistema."

  utter_homologacion_no:
    - text: "En ese caso, primero deberías realizar uno de nuestros cursos de capacitación, ya que estos permiten posteriormente acceder al proceso de homologación cuando decidas continuar con la carrera. 🚀\n\nMuchos estudiantes comienzan por los cursos porque tienen varios beneficios:\n- Obtienen **certificados de capacitación**. 🏆\n- Permite avanzar más rápido en la carrera posteriormente mediante la homologación. ⏩\n- Ayuda a descubrir y confirmar la vocación profesional. 🤔\n- Es una forma más económica de iniciar en el área de interés. 💸\n- Desde el curso ya se realizan prácticas 100% reales, lo que permite adquirir experiencia desde el inicio. 🧑‍💻"

  utter_homologacion_externos:
    - text: "En el caso de homologación para personas externas, este proceso se maneja de forma más personalizada. 🤝\n\nNuestro Instituto Superior Tecnológico Consulting Group Ecuador se caracteriza por brindar formación de calidad. Por esta razón, la información específica sobre homologación para estudiantes externos puede brindártela directamente mi asistente**Daniela**, quien podrá orientarte de manera más detallada según tu caso. 👩‍💼"

  utter_requisitos:
    - text: "🎉 ¡Nos alegra que quieras formar parte del Instituto CGE!\n📋 Para empezar tu proceso de inscripción, solo necesitas reunir:\n- 🔴 Copia a color de tu cédula. 🆔\n- 📜 Certificado de tener registrado el título de bachiller <a href='https://servicios.educacion.gob.ec/titulacion25-web/faces/paginas/consulta-titulos-refrendados.xhtml' target='_blank' class='text-primary underline font-medium hover:opacity-80' data-novoz='true'>→ Ver certificado en línea</a> (OBLIGATORIO). ✅\n- 📸 2 fotos en tamaño carnet.\n- 💰 Tu comprobante de depósito.\n\n❤️ ¡Mi asistente Daniela te guiará durante todo tu proceso! 👩‍💼"

  utter_formas_pago:
    - text: "💳 Sobre la modalidad de pago, este se realiza por **transferencia o depósito** a la cuenta oficial del Instituto. 🏦\nComo el número de cuenta y el convenio varían según tu carrera, mi asistente **Daniela** te indicará por interno la cuenta exacta para que realices tu transacción de forma segura y validemos tu comprobante. ✅ ¡Te asesora en un momento! 👩‍💼"

  utter_proceso_matricula:
    - condition:
        - type: slot
