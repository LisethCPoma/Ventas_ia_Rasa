      text: "El campo laboral en **Naturopatía** incluye:\n- Trabajar como terapeuta en instituciones públicas o privadas.\n- Establecimientos de productos naturales y spas.\n- Elaboración de productos de medicina natural.\n- Puedes emprender montando tu consultorio propio.\n\n¿Te gustaría saber dónde realizarás tus prácticas o conocer los requisitos? 😊"

    - condition:
        - type: slot
          name: carrera
          value: laboratorio clinico
      text: "Con el título de **Laboratorio Clínico** podrás desempeñarte en:\n- Consultorios, clínicas y hospitales públicos y privados.\n- Puedes establecer tu propio emprendimiento.\n\n¿Quisieras saber dónde harás tus prácticas o prefieres conocer las opciones de financiamiento? 😊"

    - condition:
        - type: slot
          name: carrera
          value: administracion de farmacias
      text: "En **Administración de Farmacias** podrás trabajar en:\n- Área administrativa de farmacias públicas o privadas.\n- Empresas distribuidoras de medicamentos e insumos médicos.\n- Puedes establecer tu propia empresa del rubro.\n\n¿Te gustaría saber en qué redes de farmacias harás tus prácticas o ver los costos? 😊"

    - condition:
        - type: slot
