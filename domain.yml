  utter_opciones_pago:
  - text: "¡Sí! Puedes realizar los pagos por semestre completo, o diferirlos en cuotas **mensuales** (5 cuotas) o **semanales** (20 semanas).\n¿Para qué carrera te gustaría consultar los valores y cuotas exactas?"

  utter_costos:
  - text: "Manejamos costos muy accesibles para que puedas formarte, si necesitas saber el costo de una carrera específica no dudes en consultarlo con Daniela, ella te dará toda la información y las posibles promociones vigentes."

  utter_practicas:
  - condition:
    - type: slot
      name: carrera
      value: enfermeria
    text: "En la carrera de **Técnico Superior en Enfermería**, tus prácticas preprofesionales se realizarán en clínicas u hospitales, trabajando directamente con pacientes reales."
  - condition:
    - type: slot
      name: carrera
      value: emergencias medicas
    text: "Para **Emergencias Médicas**, las prácticas se desarrollan en clínicas u hospitales. Además, somos el **único organismo que cuenta con ambulancias propias vinculadas al ECU 911**, por lo que participarás en escenarios reales de atención de emergencias."
  - condition:
    - type: slot
      name: carrera
      value: rehabilitacion fisica
    text: "En **Rehabilitación Física**, realizarás prácticas en clínicas, hospitales y centros de rehabilitación. Incluso CGE cuenta con su **propio centro de rehabilitación** para que puedas aprender de manera práctica."
  - condition:
    - type: slot
      name: carrera
      value: naturopatia
    text: "Las prácticas de **Naturopatía** se realizan en centros de naturopatía e instituciones de terapias alternativas con los que tenemos convenios establecidos."
  - condition:
    - type: slot
      name: carrera
      value: laboratorio clinico
    text: "En **Laboratorio Clínico**, las prácticas preprofesionales se realizan en clínicas, hospitales y laboratorios médicos externos certificados."
  - condition:
    - type: slot
      name: carrera
      value: administracion en farmacias
    text: "Las prácticas de **Administración en Farmacias** se desarrollan en el área administrativa de farmacias, clínicas, hospitales y grandes redes farmacéuticas."
  - condition:
    - type: slot
      name: carrera
      value: administracion de sistemas de la salud
    text: "Las prácticas de **Administración de Sistemas de la Salud** se desarrollan en farmacias, clínicas, hospitales y redes de salud públicas o privadas."
  - condition:
    - type: slot
      name: carrera
      value: educacion inicial
    text: "Las prácticas para **Educación Inicial** se realizan en unidades educativas y guarderías. Contamos con espacios propios como nuestro centro privado Rincón KitCGE y mas."
  - condition:
    - type: slot
      name: carrera
      value: administracion
    text: "Las prácticas de **Administración** se realizan en empresas públicas y privadas dentro del área administrativa"
  - condition:
    - type: slot
      name: carrera
      value: gastronomia
    text: "En la carrera de **Gastronomía** (disponible en Quito), las prácticas se enfocan en cocina real, con convenios en restaurantes, hoteles y establecimientos turísticos y gastronómicos."
  - condition:
    - type: slot
      name: carrera
      value: inteligencia artificial
    text: "En la carrera de **Inteligencia Artificial**, las prácticas se enfocan en el desarrollo de proyectos tecnológicos y convenios con empresas de software y tecnología."
  - text: "Nuestras prácticas preprofesionales se realizan en entornos reales dependiendo de la carrera elegida (hospitales, ambulancias ECU 911, empresas, guarderías, etc.).\nSi la carrera que te interesa tiene convenios muy específicos, **Daniela** te compartirá enseguida el listado de instituciones donde podrías realizar tus prácticas."

  utter_campo_laboral:
  - condition:
    - type: slot
      name: carrera
      value: enfermeria
    text: "Como profesional en **Enfermería**, podrás trabajar en:\n- Asilos y casas de atención al adulto mayor.\n- Cuidado domiciliario y administración de medicamentos.\n- Instituciones de salud pública (IESS, MSP) y clínicas privadas.\n- Docencia y capacitación en salud."
  - condition:
    - type: slot
      name: carrera
      value: emergencias medicas
    text: "El campo laboral en **Emergencias Médicas** incluye:\n- Atención prehospitalaria en instituciones públicas (IESS, MSP, SGR) y privadas.\n- Departamentos de salud ocupacional en empresas productivas.\n- Posibilidad de establecer una empresa propia de atención de emergencias."
  - condition:
    - type: slot
      name: carrera
      value: rehabilitacion fisica
    text: "En **Rehabilitación Física** podrás trabajar en:\n- Instituciones de salud pública (IESS, MSP) y centros privados.\n- Centros deportivos y hogares para adultos mayores.\n- Puedes emprender y abrir tu propio centro de rehabilitación."
  - condition:
    - type: slot
      name: carrera
      value: naturopatia
    text: "El campo laboral en **Naturopatía** incluye:\n- Trabajar como terapeuta en instituciones públicas o privadas.\n- Establecimientos de productos naturales y spas.\n- Elaboración de productos de medicina natural.\n- Puedes emprender montando tu consultorio propio."
  - condition:
    - type: slot
      name: carrera
      value: laboratorio clinico
    text: "Con el título de **Laboratorio Clínico** podrás desempeñarte en:\n- Consultorios, clínicas y hospitales públicos y privados.\n- Puedes establecer tu propio emprendimiento."
  - condition:
    - type: slot
      name: carrera
      value: administracion en farmacias
    text: "En **Administración en Farmacias** podrás trabajar en:\n- Área administrativa de farmacias públicas o privadas.\n- Empresas distribuidoras de medicamentos e insumos médicos.\n- Puedes establecer tu propia empresa del rubro."
  - condition:
    - type: slot
      name: carrera
      value: administracion de sistemas de la salud
    text: "Con título en **Administración de Sistemas de Salud** podrás aplicar a:\n- Administración de hospitales, clínicas y dispensarios.\n- Dirección en empresas farmacéuticas y aseguradoras médicas.\n- Cargos en organizaciones gubernamentales del sistema nacional de salud."
  - condition:
    - type: slot
      name: carrera
      value: administracion
    text: "En el área de **Administración** podrás:\n- Desempeñarte en áreas financieras y contables de empresas de todo nivel.\n- Formar parte de áreas gerenciales y logísticas.\n- Establecer tu propia empresa y aplicar tus conocimientos."
  - condition:
    - type: slot
      name: carrera
      value: educacion inicial
    text: "Para **Educación Inicial**, las salidas laborales incluyen:\n- Docencia en unidades educativas, colegios y escuelas.\n- Gestión y dirección de centros de desarrollo infantil y guarderías.\n- Emprender tu propio centro educativo o de nivelación."
  - condition:
    - type: slot
      name: carrera
      value: marketing digital
    text: "Al graduarte en **Marketing Digital** podrás desempeñarte como:\n- Líder de un departamento de ventas y ecosistema digital.\n- Community manager y gestor de tráfico pubilicitario.\n- Investigación y analista digital de mercados.\n- Establecer tu propia agencia de marketing y redes."
  - condition:
    - type: slot
      name: carrera
      value: gastronomia
    text: "En la carrera de **Gastronomía**, podrás aplicar tus conocimientos trabajando en:\n- Restaurantes de primer nivel, cruceros y hoteles.\n- Empresas de catering y eventos.\n- O, por supuesto, emprender y consolidar tu propio restaurante."
  - condition:
    - type: slot
      name: carrera
      value: mecanica automotriz
    text: "Para **Mecánica Automotriz**, tu campo laboral será en:\n- Concesionarias como mecánico.\n- Asesor técnico en empresas grandes de transporte.\n- Fábricas de ensamblaje y centros de revisión vehicular.\n- También la posibilidad de abrir tu propio taller o centro mecánico."
  - condition:
    - type: slot
      name: carrera
