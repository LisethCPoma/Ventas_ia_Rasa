version: "3.1"

rules:
- rule: Consultina se presenta cuando Daniela le da la palabra
  steps:
  - intent: presentar_consultina
  - action: utter_saludo_consultina

- rule: Consultina saluda al usuario de forma general
  steps:
  - intent: saludar
  - action: utter_saludo

- rule: Consultina se presenta cuando le preguntan quién es
  steps:
  - intent: preguntar_identidad
  - action: utter_identidad

- rule: Consultina enumera las carreras si el estudiante pregunta de manera general
  steps:
  - intent: preguntar_oferta_academica
  - action: utter_listar_oferta

- rule: Consultina explica por qué no puede mandar una lista gigante de precios
  steps:
  - intent: preguntar_lista_completa
  - action: utter_lista_completa

- rule: Consultina asegura decir la verdad
  steps:
  - intent: preguntar_veracidad
  - action: utter_veracidad

- rule: Consultina responde sobre el instituto premiado
  steps:
  - intent: preguntar_instituto_premiado
  - action: utter_instituto_premiado

- rule: Consultina enlista las carreras al preguntar un area
  steps:
  - intent: informar_area_interes
  - action: utter_listar_carreras_por_area

- rule: Consultina refuerza el cierre de ventas
  steps:
  - intent: pedir_refuerzo_cierre
  - action: utter_refuerzo_decision

- rule: Consultar base de datos para cupos
  steps:
  - intent: preguntar_cupos
  - action: action_consultar_cupos

- rule: Red de seguridad (Fallback) cuando no entiende algo
