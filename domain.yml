  - text: "Preparación de Nuestros Docentes\n\nTenemos los mejores docentes del Ecuador, todos con preparación de 3er y 4to nivel y, sobre todo, con amplia experiencia en sus áreas profesionales.\n\nComo política institucional de CGE, cada docente debe demostrar experiencia real y logros concretos dentro de su campo profesional antes de formar a nuestros estudiantes. Además, todos nuestros profesores cuentan con acreditaciones multicompetentes de reconocidas universidades del mundo y el respaldo académico de NVIDIA.\n\nPor ejemplo:\n**En el Área de Salud (Enfermería):** Deben haber salvado al menos 100 vidas a lo largo de su trayectoria.\n**En el Área Educativa (Educación Inicial):** Deben haber participado en la formación y acompañamiento educativo de al menos 200 niños.\n**En el Área Técnica (Mecánica Automotriz):** Deben haber intervenido en la reparación o diagnóstico de al menos 100 vehículos, aplicando soluciones técnicas reales.\n\n*¿De qué área específica te gustaría conocer la experiencia que exigimos a nuestros profesores?*"

  utter_costos_ocultos:
