      text: "¡Excelente elección! 💙 Con la carrera de Rehabilitación Física te formarás a un nivel más profesional para trabajar en la recuperación de pacientes. Aprenderás a evaluar el estado físico de una persona, identificar lesiones y diseñar planos de rehabilitación personalizados.\n\nTambién se aplican distintas técnicas de tratamiento, ejercicios terapéuticos y uso de equipos especializados, ayudando a mejorar la movilidad, reducir el dolor y recuperar la calidad de vida de los pacientes.\n\nDesarrollarás la capacidad de trabajar con responsabilidad en clínicas, hospitales y centros de rehabilitación, brindando un acompañamiento seguro y efectivo en cada proceso 🏥✨.\n\nTe recomiendo empezar por el curso de 6 meses, y te explico por qué puede ser la mejor opción para ti:\n✨ Es más económico, así puedes iniciar tu formación sin una inversión tan alta.\n🎓 Recibes múltiples certificados adicionales, lo que te da más respaldo y fortalece tu hoja de vida desde el inicio y ya podrías postular a un trabajo tanto en el sector público o privado.\n🩺 Es 100% práctico, vas a aprender haciendo directamente con pacientes.\n\nAdemás, algo muy importante 👇\nEste curso puede ser el primer paso para tu crecimiento profesional. Una vez que lo termines, puedes continuar con la carrera en tan solo 1 año adicional y así obtener tu título de tercer nivel. De esta forma avanzas poco a poco, define tu vocación y tienes una base sólida 👍\n💡 Muchos estudiantes comienzan así: primero se capacitan, ganan experiencia y luego continúan con la carrera para seguir creciendo.\n\nEntonces cuéntame 😊\n¿Te gustaría empezar con el curso y luego avanzar a la carrera?"
