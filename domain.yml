    text: "En la carrera de **Técnico Superior en Enfermería**, tus prácticas preprofesionales se realizarán en clínicas u hospitales, trabajando directamente con pacientes reales. ¿Deseas saber más acerca del campo laboral?"
  - condition:
    - type: slot
