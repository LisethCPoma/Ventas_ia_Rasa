  - text: "¡Sí usamos uniformes! 👕 Pero nosotros **no** los vendemos ni vienen incluidos. Al ser CGE un organismo de interés nacional reconocido por el Ministerio de Salud Pública y Gestión de Riesgos, por seguridad de nuestros pacientes e instalaciones, los uniformes se confeccionan exclusivamente en lugares autorizados.\n\nRespecto a los costos, ¡no te preocupes por ese detalle ahora! Tu docente será el encargado de guiarte paso a paso en todo el proceso para adquirirlo y te ayudará con la información necesaria. Recuerda que este valor no es un gasto, ¡es una inversión para tu futuro profesional! 🌟\n\nCuéntame, ¿qué más te gustaría saber, los requisitos de inscripción o cómo son las prácticas? 😊"

  utter_que_aprenderas_capacitadora:
    - text: "En la Capacitadora CGE nuestros cursos están diseñados para que puedas aprender habilidades prácticas reales que transformarán tu vida y la de los demás.\n\nTe comparto lo que aprenderás en cada una de nuestras áreas:\n\n**Enfermería:** Aquí aprenderás a cuidar a los pacientes de manera directa, lo que incluye la medición de signos vitales , sueroterapia e inyección , además de realizar curaciones y asistir a los médicos en diferentes procedimientos. También tendrás la oportunidad de ingresar a áreas como quirófano, UCI y salas de hospitalización , desarrollando experiencia real en el entorno de salud. Te convertirás en un apoyo fundamental para quienes más lo necesitan, brindando no solo atención, sino también empatía y confianza 💙\n\n**Emergencias Médicas:** Te prepararás para ser el héroe en momentos críticos, aprendiendo a reanimar un corazón, rescatar personas en accidentes y brindar primeros auxilios en ambulancias. Tú serás la diferencia entre la vida y la muerte.\n\n**Rehabilitación Física:** Aprenderás a ayudar a las personas a recuperar el movimiento de su cuerpo. Usarás tus manos y ejercicios para aliviar dolores y que puedan volver a caminar, jugar o bañarse solos, sin miedo ni dolor.\n\n**Laboratorio Clínico:** Te enseñaremos a tomar muestras de sangre o tejidos y analizar esos datos para detectar enfermedades. Serás clave para ayudar a los médicos a dar diagnósticos precisos que salven vidas.\n\n**Naturopatía:** Aprenderás a sanar el cuerpo usando el poder de la naturaleza, las plantas medicinales y la buena alimentación, ayudando a las personas a curarse y sentirse llenas de energía.\n\n**Odontología:** Aprenderás a cuidar sonrisas. Manejarás el instrumental dental y asistirás al odontólogo haciendo que los pacientes pierdan el miedo al sillón dental.\n\n**Farmacia:** Te familiarizarás con las medicinas, aprenderás a leer recetas difíciles y a guiar a las personas para que sigan sus tratamientos correctamente. Serás el puente entre la cura y el paciente.\n\n**Veterinaria:** Tu pasión por los animales te llevará a curar a los que no pueden hablar. Aprenderás primeros auxilios, medicación y a asistir en cirugías para salvar a las mascotas.\n\n**Educación Inicial:** Serás vital para los más pequeños. Aprenderás sobre estimulación temprana, creando ambientes mágicos donde los niños puedan explorar y ser felices. Serás su guía en sus primeros pasos.\n\n**Inyectología (Taller):** Perderás el miedo a las agujas y aprenderás la técnica exacta para canalizar vías, poner inyecciones y sueros de manera profesional y sin dejar dolor.\n\n**Mecánica (Motos y Vehículos):** Te convertirás en un solucionador de problemas. Aprenderás a escuchar los motores y arreglar fallas para que los vehículos funcionen perfectos y seguros en la carretera.\n\n**Flores de Bach:** Descubrirás cómo usar las esencias de las flores naturales para ayudar a las personas a calmar la ansiedad, quitar el estrés y sanar sus emociones con tranquilidad.\n\n¡En todos nuestros cursos aprenderás esto y muchísimas cosas más de forma 100% práctica! ¿De cuál de estos hermosos cursos te gustaría conocer los costos, la duración o los requisitos?"

